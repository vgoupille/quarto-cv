# brand.yml — Quarto brand configuration for quarto-cv
#
# This file defines default typography used by the template.
# Place a _brand.yml at your project root to customize fonts.
#
# Colors are NOT applied automatically (Quarto limitation for Typst).
# Use themes/ preset files instead for color theming:
#
#   metadata-files:
#     - themes/classic-blue.yml    # default blue
#     - themes/forest-green.yml    # natural green
#     - themes/minimal-dark.yml    # dark sidebar
#     - themes/warm-terracotta.yml # earthy terracotta
#
# Typography (accessible in Typst templates via brand.typography.*):
typography:
  base:
    family: "Poppins"
    size: 10pt
    weight: normal
    line-height: 1.2
  headings:
    family: "Poppins"
    weight: 600

# Color palette (for reference — not auto-applied to Typst).
# These colors match the classic-blue theme.
color:
  palette:
    primary: "#2563eb"
    secondary: "#64748b"
    accent: "#0891b2"
    dark: "#1e293b"
    light: "#f8fafc"
  foreground: "#1e293b"
  background: "#ffffff"
