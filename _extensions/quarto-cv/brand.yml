# Brand configuration for CV
# Customize colors and typography here

color:
  palette:
    primary: "#2563eb"      # Blue for headers and accents
    secondary: "#64748b"    # Slate gray for secondary text
    accent: "#0891b2"       # Cyan for links
    dark: "#1e293b"         # Dark slate for main text
    light: "#f8fafc"        # Light background
  
  foreground: "#1e293b"
  background: "#ffffff"

typography:
  base:
    family: "Inter"
    size: 10pt
  headings:
    family: "Inter"
    weight: 600
