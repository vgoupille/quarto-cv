# Theme: Forest Green
# Natural green — calm and organic

cv-theme:
  main-font: "Poppins"
  title-font: "Poppins"
  text-font: "Poppins"

  sidebar:
    title-color: "#166534"         # section titles
    text-color: "#14532d"          # plain text, names, key labels
    accent-color: "#4d7c0f"        # values, sub-items, secondary text
    link-color: "#15803d"          # phone, email, @username, website
    icon-color: "#166534"          # SVG icons
    photo-border-color: "#166534"  # photo border stroke

  main:
    title-color: "#166534"   # H1 — Education, Experience…
    subtitle-color: "#1a2e05"# H2 — Position, Degree…
    text-color: "#1a2e05"    # body text

  headings:
    h1: 12pt
    h2: 9pt
    h3: 8pt
    normal: 9pt

cv-layout:
  sidebar-width: 30%
  main-width: 2.5fr
  gutter: 1cm
  sidebar-bg: "#f0fdf4"      # sidebar background
  main-bg: "#ffffff"         # main content background
  margins:
    top: 0.5cm
    bottom: 0.5cm
    left: 0.5cm
    right: 0.5cm
  timeline:
    dot-size: "3pt"
    line-width: "1pt"
    dot-color: "#166534"     # timeline dots

sidebar-defaults:
  text-size: 8.5pt
  title-size: 10pt
  icon-size: 10pt
  title-after: 0.8em
  item-after: 0.7em
  section-after: 2.5em
