# Theme: Minimal Dark
# Dark sidebar — high contrast, modern

cv-theme:
  main-font: "Inter"
  title-font: "Inter"
  text-font: "Inter"

  sidebar:
    title-color: "#93c5fd"          # light blue — section titles on dark bg
    text-color: "#e2e8f0"           # near-white — plain text, names
    accent-color: "#94a3b8"         # muted gray — values, sub-items
    link-color: "#93c5fd"           # light blue — links
    icon-color: "#93c5fd"           # light blue — SVG icons
    photo-border-color: "#93c5fd"   # light blue — photo border

  main:
    title-color: "#1d4ed8"          # strong blue — H1 section headings
    subtitle-color: "#1e293b"       # dark navy — H2 position/degree
    text-color: "#334155"           # body text

  header:
    name-color: "#0f172a"           # very dark — name on white
    title-color: "#1d4ed8"          # strong blue — job title
    objective-bg: "#eff6ff"         # very light blue tint — block bg
    objective-stroke-color: "#1d4ed8"

  headings:
    h1: 12pt
    h2: 9pt
    h3: 8pt
    normal: 9pt

cv-layout:
  sidebar-width: 30%
  main-width: 2.5fr
  gutter: 1cm
  sidebar-bg: "#1e293b"      # sidebar background
  main-bg: "#ffffff"         # main content background
  margins:
    top: 0.5cm
    bottom: 0.5cm
    left: 0.5cm
    right: 0.5cm
  timeline:
    dot-size: "3pt"
    line-width: "1pt"
    # dot-color inherits from main.title-color (#1d4ed8)

sidebar-defaults:
  text-size: 8.5pt
  title-size: 10pt
  icon-size: 10pt
  title-after: 0.8em
  item-after: 0.7em
  section-after: 2.5em
